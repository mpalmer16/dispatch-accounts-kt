spring.application.name=dispatch-accounts-kt
server.port=${SERVER_PORT:8080}
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:dispatch_accounts}
spring.datasource.username=${DB_USER:dispatch}
spring.datasource.password=${DB_PASSWORD:dispatch}
spring.jpa.hibernate.ddl-auto=none
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6380}
spring.flyway.connect-retries=60
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
app.encryption.secret=${APP_ENCRYPTION_SECRET:my-super-secret-key}
app.encryption.salt=${APP_ENCRYPTION_SALT:5c0744940b5c369b}
